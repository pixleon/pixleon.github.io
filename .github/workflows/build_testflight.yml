name: TestFlight Upload

on:
  workflow_dispatch:

env:
  GODOT_VERSION: "4.7-stable"
  APPSTORE_PROFILE_NAME: "Ahoyoo App Store"

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Require signing secrets
        env:
          HAS_CERT: ${{ secrets.APPLE_DIST_CERTIFICATE_BASE64 }}
          HAS_KEY: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          if [ -z "$HAS_CERT" ] || [ -z "$HAS_KEY" ]; then
            echo "Missing TestFlight secrets. Required:"
            echo "  APPLE_DIST_CERTIFICATE_BASE64, APPLE_DIST_CERTIFICATE_PASSWORD,"
            echo "  APPLE_APPSTORE_PROFILE_BASE64, APPLE_TEAM_ID,"
            echo "  APPLE_API_KEY_ID, APPLE_API_ISSUER_ID, APPLE_API_KEY_BASE64"
            exit 1
          fi

      - name: Cache Godot iOS frameworks
        id: cache-frameworks
        uses: actions/cache@v4
        with:
          path: /tmp/godot-ios-frameworks
          key: godot-ios-${{ env.GODOT_VERSION }}

      - name: Download Godot export templates
        if: steps.cache-frameworks.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/godot-ios-frameworks
          curl -L -o /tmp/templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_export_templates.tpz"
          unzip -q /tmp/templates.tpz "templates/ios.zip" -d /tmp
          unzip -q /tmp/templates/ios.zip \
            "libgodot.ios.release.xcframework/*" \
            "MoltenVK.xcframework/*" \
            -d /tmp/godot-ios-frameworks
          rm -f /tmp/templates.tpz /tmp/templates/ios.zip

      - name: Place frameworks in project
        run: |
          cp -R /tmp/godot-ios-frameworks/libgodot.ios.release.xcframework \
            ahoyoo_ios/Ahoyoo.xcframework
          cp -R /tmp/godot-ios-frameworks/MoltenVK.xcframework \
            ahoyoo_ios/MoltenVK.xcframework

      - name: Install distribution certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DIST_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DIST_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Install App Store provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_APPSTORE_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/appstore.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision

      - name: Mark encryption exempt
        run: |
          # Skips the export-compliance question for every TestFlight build
          PLIST=$(find ahoyoo_ios -maxdepth 2 -name "*-Info.plist" | head -1)
          echo "Patching $PLIST"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"

      - name: Archive and export (App Store)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ahoyoo_ios

          xcodebuild \
            -project Ahoyoo.xcodeproj \
            -scheme Ahoyoo \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Ahoyoo.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ env.APPSTORE_PROFILE_NAME }}" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            archive

          cat > $RUNNER_TEMP/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.pixleon.ahoyoo</key>
                  <string>${{ env.APPSTORE_PROFILE_NAME }}</string>
              </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Ahoyoo.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          IPA=$(ls $RUNNER_TEMP/export/*.ipa | head -1)
          echo "Uploading $IPA (build number ${{ github.run_number }})"

          mkdir -p ~/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${API_KEY_ID}.p8

          if xcrun altool --version >/dev/null 2>&1; then
            xcrun altool --upload-app --type ios -f "$IPA" \
              --apiKey "$API_KEY_ID" --apiIssuer "$API_ISSUER_ID"
          else
            # altool removed from newer Xcode; fastlane is preinstalled on the runners
            KEY_JSON=$RUNNER_TEMP/api_key.json
            python3 - "$API_KEY_ID" "$API_ISSUER_ID" ~/private_keys/AuthKey_${API_KEY_ID}.p8 "$KEY_JSON" <<'EOF'
          import json, sys
          key_id, issuer_id, key_path, out_path = sys.argv[1:5]
          with open(key_path) as f:
              key = f.read()
          with open(out_path, "w") as f:
              json.dump({"key_id": key_id, "issuer_id": issuer_id, "key": key, "in_house": False}, f)
          EOF
            fastlane pilot upload --ipa "$IPA" \
              --api_key_path "$KEY_JSON" \
              --skip_waiting_for_build_processing true
          fi

      - name: Cleanup signing
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/certificate.p12 $RUNNER_TEMP/appstore.mobileprovision
          rm -f ~/private_keys/AuthKey_*.p8 $RUNNER_TEMP/api_key.json
